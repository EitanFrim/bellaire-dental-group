name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - run: npm ci

      # GitHub Pages is static-only — the POST appointment-request API can't run
      # there (booking uses the real PMS scheduler instead), so drop the API
      # routes before the static export.
      - name: Remove server-only API routes for static export
        run: rm -rf app/api

      - name: Build static site
        env:
          STATIC_EXPORT: "1"
          # Served from the project subpath until the custom domain is attached.
          # When you add bellairedentalgroup.com, set PAGES_BASE_PATH to "" and
          # NEXT_PUBLIC_SITE_URL to the real domain (and add a CNAME file).
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.origin }}${{ steps.pages.outputs.base_path }}
        run: npm run build

      # Next's static export can't emit _next under a leading-underscore path
      # that Pages' Jekyll would ignore — disable Jekyll.
      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
